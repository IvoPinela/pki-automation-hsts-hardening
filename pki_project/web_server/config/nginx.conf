server {
    # Ouvir na porta 443 com SSL e HTTP/2
    listen 443 ssl http2;
    server_name app.cyber.local;

    # Caminhos para os certificados que gerámos
    ssl_certificate /etc/nginx/ssl/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # --- SEGURANÇA DE PROTOCOLO (Hardening) ---
    # Desativar TLS 1.0 e 1.1 (vulneráveis). Forçar 1.2 e 1.3.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    
    # Cifras fortes (Modernas)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # --- CABEÇALHO HSTS (O ponto principal do projeto) ---
    # max-age: 1 ano (31536000 segundos)
    # includeSubDomains: Aplica a segurança a todos os subdomínios
    # preload: Permite que o domínio seja incluído na lista de "apenas HTTPS" dos browsers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Outros cabeçalhos de segurança recomendados
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}